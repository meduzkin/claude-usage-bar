name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  swift-build:
    name: Universal binary build
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: |
          swift --version
          swiftc --version
          xcodebuild -version
      - name: Build universal binary
        run: ./build.sh
      - name: Verify artifact
        run: |
          file claude-usage-bar
          lipo -info claude-usage-bar
          test -x claude-usage-bar
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: claude-usage-bar-${{ github.sha }}
          path: claude-usage-bar
          retention-days: 7
